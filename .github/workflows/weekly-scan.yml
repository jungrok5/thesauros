name: Weekly Book-Rule Scan
# 책 정신의 매매 결정 cron — 주봉 종가 후 1회만 실행.
#
# 책 2부 3장:
#   "주봉 = 매주 금요일 오후 2시 1회 확인"
#   "매매는 안 할수록 좋다"
#
# Daily 데이터 적재 (bars / macro / investor_flow / disclosure 알림) 는
# daily-data.yml. 이 workflow 는 분석 + 결정-grade 알림 전용.
#
# Responsibilities:
#   - scan_daily (전체 KR universe 17 패턴 분석 + analyze_results 갱신
#     + scan_results 의 active 신호 갱신)
#   - telegram_worker (enter / pyramid / warn / exit / target / stop)
#
# Trigger: GH native `on: schedule:` (primary) + Vercel Cron →
# /api/cron/weekly-scan → workflow_dispatch (fallback). 금요일 08:30
# UTC = 17:30 KST. KRX 장 마감 (15:30 KST) 후 FDR/Naver 데이터
# publish 안정화 후 안전한 분석 타이밍. 단 schedule 트리거는
# inputs.send_alerts 없어서 EVENT_NAME=schedule 분기로 진짜 발송.
# Lock down GITHUB_TOKEN — defaults to repo read-write; these
# workflows only need read for checkout (no commits/PRs/issues from
# them). Defense in depth in case any third-party action gets pwned.
permissions:
  contents: read

on:
  # GH native schedule — primary. 금요일 08:30 UTC = 17:30 KST.
  # 2026-05-28 finding: Vercel cron Hobby tier 가 fire 안 함.
  # GH 자체 schedule 은 PUBLIC repo 라 무료 + 안정. Vercel chain
  # (vercel.json /api/cron/weekly-scan) 는 fallback 으로 유지하되
  # GH 가 single source of truth. schedule 트리거 시 inputs 는
  # default 적용 (send_alerts=true 가 필요해 schedule 분기 처리).
  schedule:
    - cron: "30 8 * * 5"
  workflow_dispatch:
    inputs:
      send_alerts:
        description: "텔레그램 alert 실제 발송 여부 (manual run default false — 책 정신: 비-금요일 발사 X)"
        type: boolean
        default: false

concurrency:
  group: weekly-scan
  # Vercel + GH 둘 다 fire 시 두번째 대기. scan 작업은 idempotent.
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # 30 min — scan_daily ~13 min + telegram_worker ~1 min + assertions
    # ~2 min + ping ~1 min. 30 min 여유.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase "psycopg[binary]"

      - name: Notify admin — cron start
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m app.db.notify_admin_cron start --label "Weekly 분석 (주봉 종가)"

      - name: Run scan_daily (full KR universe)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # KR (KOSPI + KOSDAQ ~2,700) + user watchlist 확장.
          # 종목당 ~0.29s × 2,700 = ~13 min.
          # 책 정신: 주봉 종가 후 분석 → enter/exit 결정. 매일 분석은
          # 책-위반 (사용자가 매일 결정하게 만듦).
          python -m app.db.scan_daily

      - name: Send Telegram + Web Push alerts (decision-grade)
        # 2026-05-28 — inputs.send_alerts via env (not direct ${{}} into
        # shell test) to block injection. type=boolean limits GHA UI
        # to true/false but REST API dispatch can submit arbitrary strings.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT_EMAIL: ${{ secrets.VAPID_CONTACT_EMAIL }}
          WEB_BASE_URL: https://thesauros2026.vercel.app
          EVENT_NAME: ${{ github.event_name }}
          SEND_ALERTS: ${{ inputs.send_alerts }}
        run: |
          # enter / pyramid / warn / exit / target / stop 알림.
          # 주봉 마감 후만 발사 = 책 정신.
          # alert_preferences.bedrest_mode=true 사용자는 short-circuit.
          # eligibility CONDITIONAL (자리 X) 면 enter-class alert drop.
          #
          # Manual dispatch protection: 책 정신상 주봉 종가 후 1회 발사
          # 인데, manual dispatch (비-금요일 / 사용자 트리거) 시 alert
          # 가 다시 발사되면 사용자가 "왜 화요일에 alert 왔지" 혼란.
          # 해결: workflow_dispatch + inputs.send_alerts=false 면
          # --dry-run 으로 실행 (log 만, 발송 X). 명시적 send_alerts=true
          # 시에만 진짜 발송. Vercel cron (scheduled) trigger 시엔 input
          # 이 없어 진짜 발송 (정상 흐름).
          args=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$SEND_ALERTS" != "true" ]; then
            args="--dry-run"
            echo "::notice::Manual dispatch — alerts in dry-run mode. dispatch with send_alerts=true to actually send."
          fi
          python -m app.db.telegram_worker $args

      - name: Send 와병투자 주간 요약 (bedrest digest)
        # 책 2부 3장 정신 — bedrest_mode=true 사용자는 위 즉시 alert
        # 전부 skip. 그 대신 주 1회 통합 요약 받음. 와병투자 핵심 매커니즘.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          SEND_ALERTS: ${{ inputs.send_alerts }}
        run: |
          digest_args="--digest"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$SEND_ALERTS" != "true" ]; then
            digest_args="$digest_args --dry-run"
          fi
          python -m app.db.telegram_worker $digest_args

      - name: Book exit alerts (월봉 10MA / 4등분 25% — holdings)
        # 2026-05-29 — replaces the legacy -10% % stop alert with the
        # book's actual two %-free exits (월봉 10MA break + 장대양봉
        # 4등분 25% break). 천장 패턴 exit is already handled by the
        # telegram_worker step above. notify_stop_loss.py + the
        # stop_loss_alert_seen table remain for historical reads only —
        # no new rows after this change.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          SEND_ALERTS: ${{ inputs.send_alerts }}
        run: |
          book_args=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$SEND_ALERTS" != "true" ]; then
            book_args="--dry-run"
          fi
          python -m app.db.notify_book_exits $book_args

      - name: Data-quality assertions
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pip install pytest
          python -m pytest app/db/tests/test_data_quality.py -v

      - name: Notify admin — cron end
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m app.db.notify_admin_cron end --status ${{ job.status }} --label "Weekly 분석 (주봉 종가)"
