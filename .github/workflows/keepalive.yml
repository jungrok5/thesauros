name: Supabase Keepalive
# Pings the Supabase DB once a day to prevent the free-tier inactivity
# pause (7-day no-query rule).
# Lock down GITHUB_TOKEN — defaults to repo read-write; these
# workflows only need read for checkout (no commits/PRs/issues from
# them). Defense in depth in case any third-party action gets pwned.
permissions:
  contents: read

on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC = 10:30 KST
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install "psycopg[binary]" python-dotenv
      - name: Ping health_ping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python -c "
          import os, psycopg
          url = os.environ['SUPABASE_URL']
          pw = os.environ['SUPABASE_DB_PASSWORD']
          ref = url.replace('https://','').replace('.supabase.co','')
          dsn = f'postgresql://postgres.{ref}:{pw}@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres'
          with psycopg.connect(dsn, autocommit=True, prepare_threshold=None) as conn:
              with conn.cursor() as cur:
                  cur.execute('UPDATE health_ping SET pinged_at = now() WHERE id = 1')
                  cur.execute('SELECT pinged_at FROM health_ping WHERE id = 1')
                  print('ping ok', cur.fetchone()[0])
          "
