name: Daily Book-Rule Scan
# Runs the daily book-rule scan against the canonical universe and publishes
# results to Supabase.
#
# Triggering (2026-05-21 — moved from GH schedule to Vercel Cron):
#   GH `schedule:` cron was best-effort on free tier and observed to
#   miss the 17:00 KST run during high-traffic windows. We now trigger
#   from Vercel Cron (web-next/vercel.json) which hits
#   /api/cron/daily-scan → GitHub workflow_dispatch endpoint here.
#   Vercel Cron runs on independent infra with ~100% trigger reliability.
#
# Manual invocation: workflow_dispatch UI / gh CLI still works for ad-hoc
# re-runs. No `schedule:` block here intentionally — single trigger source
# avoids the "duplicate run via both Vercel and GH" problem.
on:
  workflow_dispatch:

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    # 75 min ceiling (was 60). DART ingest was moved to weekly so the
    # critical path is now ~25 min (bars 7 + scan 1 + macro 1 +
    # investor_flow 15 + telegram 1 + assertions 1); the headroom
    # absorbs Naver/FDR slowdowns without flakiness.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase "psycopg[binary]"

      - name: Apply retention FIRST (free space before ingest)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Supabase Free 500MB → read-only at the ceiling. Running retention
          # AFTER ingest risked tipping over the edge during the day's adds
          # before the post-ingest cleanup got to delete. Cleaning first
          # keeps the in-day high-water-mark below the limit.
          python -m app.db.retention

      - name: Refresh bars (KR W+M resampled from FDR; US watchlist via Naver)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Weekly bars only update once a week — running Mon-Thu would
          # just rewrite the same in-progress W bar. Friday after KRX
          # close (08:00 UTC = 17 KST) captures the settled week.
          # workflow_dispatch always runs so manual reruns can refresh
          # mid-week if needed.
          dow=$(date -u +%u)   # 1=Mon..5=Fri..7=Sun
          if [ "$dow" != "5" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Skipping bar ingest on dow=$dow (only Friday + manual dispatch)"
            exit 0
          fi
          python -m app.db.ingest_bars

      - name: Run scan_daily (watchlist scope)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Search-only pivot (2026-05-19): scan ONLY tickers users have
          # on their watchlists. Out-of-watchlist tickers are analysed
          # on demand via /api/analyze/[ticker] (24h cache) when a user
          # opens /stocks/[ticker]. This keeps alerts + chip data warm
          # for the names users care about without scanning ~2,700 KR
          # tickers nightly for nobody.
          # Friday-only — weekly W bar doesn't change Mon-Thu.
          dow=$(date -u +%u)
          if [ "$dow" != "5" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Skipping scan on dow=$dow (only Friday + manual dispatch)"
            exit 0
          fi
          # 2026-05-20: --watchlist-only 제거 → 전 KR 활성 종목 매일 재분석.
          # 측정: 종목당 ~0.13초 × 2,700 = ~6분. 30분 cron budget 안에 여유.
          # 효과: analyze_results 가 매일 fresh → 폭증/스크리너/검색 페이지의
          # 가격 / action / score 가 항상 최신. 그동안 search-only pivot
          # 으로 watchlist 외 종목 며칠~주 stale 던 문제 근본 해결.
          #
          # 2026-05-21 v2: --markets KOSPI KOSDAQ — US universe 자체 제외.
          # 이유: 처음엔 --sp500-only (S&P 500 만) 시도했지만 같은 timeout
          # 발생. log 분석 결과 Naver weekCandle 가 ABBV/ABT/ACN/ADM 같은
          # **정상 S&P 500 대형주** 에서도 모두 10s timeout. 즉 invalid
          # ticker 가 아니라 Naver 가 GH Actions Azure IP 자체 block 시작
          # (메모리 project_us_yfinance_blocked.md 의 issue 가 yfinance →
          # Naver 까지 확장). cloud IP block 은 코드로 해결 X.
          #
          # 해법: KR universe (KOSPI + KOSDAQ) 만 base scan. US 분석은
          # _watchlist_tickers() 가 user watchlist 의 US 종목 (8 개) 만
          # 자동 추가 — 그 8 개의 bars 는 별도 step (ingest_bars) 가 미리
          # watchlist-only 로 fetch 해뒀고, scan_daily 는 DB bars 만 읽음
          # (fetch 안 함). watchlist 외 US 종목 (예: 일반 S&P) 의
          # analyze_results 는 stale 가능 — 사용자가 그 종목 page 열면
          # /api/quote (client-side, residential IP) 가 fresh 데이터 보여줌.
          python -m app.db.scan_daily --markets KOSPI KOSDAQ

      - name: Publish macro state
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python -m app.db.publish_macro

      # Themes ingest removed 2026-05-19: /themes page deleted as part of
      # the search-only pivot. Universe-wide auto-classification produced
      # too many false positives; users now search for individual tickers.

      - name: Ingest investor flow (Naver Finance)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Scrapes finance.naver.com/item/frgn.naver per ticker. Covers
          # full KOSPI/KOSDAQ universe — KIS vts returned 500 for large
          # caps (SK하이닉스/기아) so we replaced it.
          python -m app.db.ingest_investor_flow

      # DART disclosure ingest moved to weekly-fundamentals.yml on
      # 2026-05-19. It was the largest single-step on daily-scan (~37
      # min for ~2,700 KR tickers via DART OpenAPI), pushing the
      # workflow past the 60-min ceiling. Corporate filings update
      # weekly cadence at most for our display surface — same as
      # financials_eval — so consolidating there keeps daily-scan lean
      # while disclosures stay current within a week.

      - name: Send Telegram + Web Push alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT_EMAIL: ${{ secrets.VAPID_CONTACT_EMAIL }}
        run: |
          # Reads scan_results + watchlist + alert_preferences and emits
          # 🟢 매수 / 🟡 추가매수 / 🟠 경고 / 🔴 청산 / 🎯 목표 / 🛑 손절
          # to Telegram (and PWA push for subscribed users). Idempotent
          # via the `alerts` table.
          python -m app.db.telegram_worker

      - name: Disclosure alerts (DART 새 공시 → Telegram)
        # Watchlist 종목만 (전체 universe X) → 30~100 종목, ~4 min.
        # DART 1000 req/min cap 안에 안전. disclosure_alert_seen PK
        # 로 (user, rcept_no) 멱등 — 재실행해도 중복 알림 X.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: timeout 10m python -m app.db.notify_disclosure_alerts

      - name: Data-quality assertions
        if: always()   # run even if a preceding step failed, so we surface what landed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pip install pytest
          python -m pytest app/db/tests/test_data_quality.py -v
