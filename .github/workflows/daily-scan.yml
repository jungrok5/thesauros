name: Daily Book-Rule Scan
# Runs the daily book-rule scan against the canonical universe and publishes
# results to Supabase. Cron is in UTC; 07:00 UTC = 16:00 KST (after KR close).
on:
  schedule:
    - cron: "0 7 * * 1-5"   # Mon-Fri 16:00 KST
  workflow_dispatch:

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase "psycopg[binary]"

      - name: Refresh bars_daily (KR via FDR + US via yfinance)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Incremental OHLCV catch-up. Must run BEFORE scan_daily — otherwise
          # the scanner sees yesterday's prices.
          python -m app.db.ingest_bars_daily

      - name: Run scan_daily
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CODE: ${{ secrets.KIS_ACCOUNT_PROD_CODE }}
          KIS_ENV: "vts"
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # Universe: KOSPI + KOSDAQ + S&P 500 (US 9.5K 전체는 Supabase 한도 초과).
          # `--sp500-only` confines NASDAQ/NYSE to constituents of S&P 500.
          # `--years 2` keeps bars_daily within the 500MB free tier.
          python -m app.db.scan_daily --markets KOSPI KOSDAQ NASDAQ NYSE \
            --sp500-only --years 2

      - name: Publish macro state
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python -m app.db.publish_macro

      - name: Ingest themes (Naver)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # --themes-only on weekdays (fast). Full membership refresh weekly.
          if [ "$(date -u +%u)" = "5" ]; then
            python -m app.db.ingest_themes
          else
            python -m app.db.ingest_themes --themes-only
          fi

      - name: Ingest investor flow (Naver Finance)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Scrapes finance.naver.com/item/frgn.naver per ticker. Covers
          # full KOSPI/KOSDAQ universe — KIS vts returned 500 for large
          # caps (SK하이닉스/기아) so we replaced it.
          python -m app.db.ingest_investor_flow

      - name: Ingest DART disclosures (KR)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          # DART OpenAPI — only the 공시 (corporate filings) flow. News
          # text is fetched in real-time from Naver via /api/news/[ticker]
          # so this step covers disclosures only.
          python -m app.db.ingest_news --days-back 7

      - name: Apply retention (keep DB < 500MB Free tier)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # bars 2y / investor_flow 90d / disclosures 1y / scan_results
          # inactive>=30d / theme_daily 180d. See app/db/retention.py.
          python -m app.db.retention

      - name: Data-quality assertions
        if: always()   # run even if a preceding step failed, so we surface what landed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pip install pytest
          python -m pytest app/db/tests/test_data_quality.py -v
