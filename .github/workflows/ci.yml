name: CI

# Lock down GITHUB_TOKEN — defaults to repo read-write; these
# workflows only need read for checkout (no commits/PRs/issues from
# them). Defense in depth in case any third-party action gets pwned.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pitfalls:
    name: Static pitfall checks (Next.js/GH-Actions/PostgREST traps)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Fast guard catching the regression family enumerated in CLAUDE.md §5:
    # middleware.ts × proxy.ts coexistence, job-level secrets gating, etc.
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-known-pitfalls.sh

  book:
    name: Book engine unit tests (no DB)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Runs on every push/PR — no Supabase secrets needed because these
    # tests use synthetic OHLCV. Catches the H&S extrapolation / stale
    # entry_plan family of bugs before they reach prod.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest app/book/tests/ -v

  web-unit:
    name: Web unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Pure logic tests — freshness buckets, signal labels, redirect
    # sanitizer. No browser, no DB. Catches the family of "page-level
    # data transform" bugs that Playwright is too slow to enumerate.
    defaults:
      run:
        working-directory: web-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-next/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  python:
    name: Python smoke + scan tests (DB-backed)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # GitHub rejects `if: ${{ secrets.X != '' }}` at job level (entire
    # workflow gets a 0-second "workflow file issue" failure — all CI
    # runs from 2026-05-18 morning were silently broken because of this).
    # Move the gate to a first step that exits 0 when secrets are absent.
    steps:
      - name: Check secrets present
        id: secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "no_secrets=true" >> "$GITHUB_OUTPUT"
            echo "SUPABASE_URL not set — skipping DB-backed tests"
          fi
      - uses: actions/checkout@v4
        if: steps.secrets.outputs.no_secrets != 'true'
      - uses: actions/setup-python@v5
        if: steps.secrets.outputs.no_secrets != 'true'
        with: { python-version: "3.11", cache: "pip" }
      - run: |
          pip install -r requirements.txt
          pip install supabase "psycopg[binary]"
        if: steps.secrets.outputs.no_secrets != 'true'
      - run: pip install pytest
        if: steps.secrets.outputs.no_secrets != 'true'
      - if: steps.secrets.outputs.no_secrets != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # 전 DB-backed test suite — 한 줄로 돌려서 새 테스트 파일 추가 시
          # CI 갱신 불필요. 2026-05-20 발견: rpc_integration / retention_policies
          # / telegram_worker_dedupe 등이 그동안 CI 에서 안 돌고 있었음.
          python -m pytest app/db/tests/ app/data/tests/ -v --tb=short

  web:
    name: Next.js typecheck + lint + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-next/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx playwright install chromium --with-deps
      - name: Start Next.js
        run: nohup npm run dev > /tmp/next.log 2>&1 &
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-dummy-secret-padding-padding-padding' }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || '' }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || '' }}
          AUTH_ALLOWED_EMAILS: ${{ secrets.AUTH_ALLOWED_EMAILS || '' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'ci-dummy-anon-key' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'ci-dummy-service-key' }}
      - name: Wait for dev server
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000/login >/dev/null; then echo ready; exit 0; fi
            sleep 1
          done
          echo "dev server failed to start"
          tail -50 /tmp/next.log || true
          exit 1
      - name: Run Playwright
        run: npx playwright test e2e/public.spec.ts e2e/book-site.spec.ts --reporter=list
