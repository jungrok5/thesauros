name: Daily Data Refresh
# Daily data-plumbing only — no signal generation, no decision-grade
# alerts. 책 정신 (2부 3장) 분리: 매매 결정은 주봉 종가 후 1회.
# scan_daily + telegram_worker (enter/exit/pyramid) 는 weekly-scan.yml
# 로 옮김.
#
# Daily responsibilities:
#   - retention (DB cleanup before ingest)
#   - ingest_bars (오늘 KR 종가 적재 — 주봉이지만 매일 1행씩 갱신)
#   - macro_state (FRED + global indices)
#   - investor_flow (Naver 외인+기관 — 선행성 신호, 책 5장)
#   - disclosure alerts (DART 새 공시 — 이벤트성 정보)
#   - data-quality assertions
#
# Trigger: Vercel Cron → /api/cron/daily-data → workflow_dispatch.
# 매일 08:00 UTC = 17:00 KST.
on:
  workflow_dispatch:

concurrency:
  group: daily-data
  cancel-in-progress: false

jobs:
  data:
    runs-on: ubuntu-latest
    # 30 min ceiling — scan_daily + telegram-enter/exit step 들이
    # weekly-scan 으로 이전되어 daily 는 retention + bars + macro +
    # investor_flow + disclosure alerts + assertions 만 남음.
    # 측정 (2026-05-22 직전 cron): retention 0.5 + bars 7 + macro 0.5
    # + investor_flow 15 + disclosure_alerts 3 = ~26 min. 30 min 충분.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase "psycopg[binary]"

      - name: Notify admin — cron start
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m app.db.notify_admin_cron start --label "Daily 데이터 갱신"

      - name: Apply retention FIRST (free space before ingest)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python -m app.db.retention

      - name: Evict stale US bars cache (Phase 6, 7-day TTL)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python -c "from app.db.us_bars_cache import evict_stale; n=evict_stale(); print(f'evicted {n} stale us_ticker_cache rows')"

      - name: Refresh bars (KR W+M resampled from FDR)
        # KR weekly bars: 매일 종가가 in-progress W bar 의 마지막 일자 1
        # row 만 갱신. 금요일 종가가 settled W bar 를 확정. FDR 가 종가
        # publish 후 17:00 KST 까지 안정화. 매일 실행해서 in-progress
        # bar 가 최신 종가 반영하게 유지.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python -m app.db.ingest_bars

      - name: Publish macro state
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m app.db.publish_macro

      - name: Ingest investor flow (Naver Finance)
        # 책 5장: 거래량은 선행성. 외인+기관 5일 동행 매수 신호는 매일
        # 갱신해야 가치 있음 — 책 정신상 매매 결정은 주봉이지만, 이건
        # 선행 데이터 적재 (decision-grade 가 아닌 information).
        #
        # 2026-05-27 — pages 3→2, workers 8→12. 이전 default 가 30일치
        # (3 pages × 10 entries) 를 가져오는데 retention 이 14일이라
        # 절반은 적재 즉시 폐기. 17분 → ~7분 예상. job 30분 타임아웃
        # 거의 다 먹어서 disclosure_alerts 가 cancel 되던 문제 해결.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python -m app.db.ingest_investor_flow --pages 2 --workers 12

      - name: Disclosure alerts (DART 새 공시 → Telegram)
        # 이벤트성 알림 — 새 공시는 발생 시점이 곧 의미. 책 정신상 매매
        # 결정 ≠ 이벤트 인지. 자사주 매입 / 5% 지분 변동 등은 매일
        # 새로 발생 시 알리는 게 자연스러움.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: timeout 10m python -m app.db.notify_disclosure_alerts

      # 2026-05-28 — Paper-trade alerts step removed. Paper feature
      # dropped in favor of "관심 등록 = entry_price 스냅샷 + 수익률
      # 추적" model. Stop-loss alerts now flow through the existing
      # notify_stop_loss step (weekly-scan.yml) reading watchlist
      # category='holding' + entry_price.

      - name: Data-quality assertions
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pip install pytest
          # test_naver_news_links_live.py is a live probe — catches
          # Naver shifting its article URL format the way it did on
          # 2026-05-22.
          python -m pytest \
            app/db/tests/test_data_quality.py \
            app/db/tests/test_naver_news_links_live.py \
            -v

      - name: Notify admin — cron end
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m app.db.notify_admin_cron end --status ${{ job.status }} --label "Daily 데이터 갱신"
