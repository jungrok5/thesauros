name: Weekly Fundamentals + Evaluation

# Workflow runs many heavy ingests (DART, SEC, market signals, eval).
# Two safeguards against any single step monopolizing the budget:
#   - PYTHONUNBUFFERED=1 globally → logs flush in real time, easier to
#     triage which step actually hangs (block-buffering hid this when
#     the 60-min cancel killed a stuck DART step with no console output).
#   - `timeout` shell wrapper on each heavy step → a stuck upstream
#     (DART corpCode download, KRX 503s, etc.) hard-fails after its
#     budget instead of soaking the whole hour.
env:
  PYTHONUNBUFFERED: "1"
# Pulls KR corporate fundamentals from DART OpenAPI, then runs the rule-
# based financials/factors evaluator. Stores into Supabase tables
# `fundamentals`, `financials_eval`, `factors_eval`. Site reads these
# via the stocks/[ticker] page's context tabs.
#
# Schedule: Saturdays 02:00 UTC (= 11:00 KST). Fundamentals update on a
# quarterly cadence, so weekly is more than enough — we just want a
# steady refresh signal.

on:
  schedule:
    - cron: "0 2 * * 6"   # Saturday 02:00 UTC = 11:00 KST
  workflow_dispatch:
    inputs:
      limit:
        description: "limit fundamentals fetch to N stock codes (debug)"
        required: false

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    # 120 min total — DART (~15m) + SEC (~5m engagement-only) + market
    # signals (~10m) + company profile (~5m) + eval (~5m) + 2 retention
    # sweeps (~1m each). 90m would be tight; 120m absorbs occasional
    # API slowdowns and avoids the "60-min cap killed a healthy run"
    # failure mode.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - run: |
          pip install -r requirements.txt
      - name: Retention sweep FIRST (free space before ingest)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Same pattern as daily-scan — sweep before big writes so the
          # Supabase 500 MB ceiling isn't tripped mid-cron (which would
          # leave the DB in read-only mode + partial data). The trailing
          # "Retention sweep (post-ingest)" step then catches anything
          # that slipped through during the run.
          python -m app.db.retention
      - name: DART fundamentals ingest (Supabase direct)
        # `timeout` shell wrapper: hard-fail after 25 min so a stuck
        # corpCode download or DART rate-limit storm can't soak the
        # whole 120-min workflow budget. `continue-on-error` so later
        # steps (SEC, market signals) still run when DART struggles.
        # See PYTHONUNBUFFERED env at top — keeps logs visible if the
        # timeout kicks in.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: timeout 25m python -m app.data.ingest_dart
      - name: DART disclosures ingest (KR corporate filings)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          # Moved here from daily-scan (2026-05-19) — DART per-company
          # API call across the KR universe takes ~37 min, blowing the
          # daily 60-min budget. Disclosures update weekly cadence at
          # most for our display surface, so weekly is sufficient and
          # keeps daily-scan focused on price/flow refresh.
          # 90-day backfill so the Saturday catch-up picks up the
          # whole prior week + buffer for any past misses.
          timeout 40m python -m app.db.ingest_news --days-back 90
      - name: Market signals — KR short sales + dividends + warnings
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # pykrx (shorts + dividends) + Naver scrape (warnings).
          # Engagement-set filter inside the script keeps this bounded.
          timeout 20m python -m app.data.ingest_market_signals
      - name: Analyst consensus + target price (Naver mobile)
        # Pulls forward EPS / revenue / op_income from finance.annual
        # and priceTargetMean from integration. Engagement-filtered →
        # ~2,700 KR tickers × 2 Naver calls each. ~12-15 min with
        # 0.15s sleep cushioning the rate limit.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: timeout 25m python -m app.data.ingest_consensus
      - name: 5% 대량보유 보고 (DART majorstock)
        # DART openAPI is rate-bounded at 10K calls/day. Engagement set
        # ~2,700 tickers → 1 call each, comfortably under cap. Most
        # small caps return status=013 (no holder ever ≥5%); only
        # mid/large caps actually write rows.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: timeout 25m python -m app.data.ingest_institutional_ownership
      - name: Earnings calendar (KR filing cadence)
        # Pure DB-side seed — no external calls. Inserts the next 4
        # legal filing cutoffs per ticker (1Q/2Q/3Q/FY). UI joins
        # against analyst_consensus + fundamentals for actuals.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: timeout 5m python -m app.data.ingest_earnings_calendar
      - name: SEC EDGAR fundamentals + filings (US tickers)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          # Mirrors DART for the US side: companyfacts → `fundamentals`,
          # submissions → `disclosures`. SEC fair-use throttles at 10 r/s;
          # the module sleeps 0.15s/req so it stays comfortable. Rate-
          # limit headroom keeps this <15 min for the current US set.
          timeout 15m python -m app.data.ingest_sec
      - name: Company profile ingest (DART + SEC EDGAR)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          # Refresh company overview + recent filings for every active
          # KR ticker + every watchlisted US ticker. Light load
          # (~3K API calls), runs in <10 min.
          timeout 15m python -m app.data.ingest_company_profile
      - name: Evaluate financials + factors
        # Eval scans ~2,700 KR tickers + computes PER/PBR + 4-axis +
        # gates. 10 min was too tight (last run timed out). Bumped to
        # 30 min with continue-on-error so the trailing retention
        # sweep still runs if eval is slow.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: timeout 30m python -m app.db.eval_financials --verbose
      - name: Retention sweep (post-ingest)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # SEC ingest already filters to the engagement set, but DART
          # writes the full KR universe and `analyze_results` /
          # `disclosures` may still have rows for previously-engaged-but-
          # now-stale tickers. Sweep keeps the 500MB tier honest.
          python -m app.db.retention
