name: Weekly Fundamentals + Evaluation
# Pulls KR corporate fundamentals from DART OpenAPI, then runs the rule-
# based financials/factors evaluator. Stores into Supabase tables
# `fundamentals`, `financials_eval`, `factors_eval`. Site reads these
# via the stocks/[ticker] page's context tabs.
#
# Schedule: Saturdays 02:00 UTC (= 11:00 KST). Fundamentals update on a
# quarterly cadence, so weekly is more than enough — we just want a
# steady refresh signal.

on:
  schedule:
    - cron: "0 2 * * 6"   # Saturday 02:00 UTC = 11:00 KST
  workflow_dispatch:
    inputs:
      limit:
        description: "limit fundamentals fetch to N stock codes (debug)"
        required: false

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # DART throttles; full KR universe takes time
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - run: |
          pip install -r requirements.txt
      - name: DART fundamentals ingest (Supabase direct)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python -m app.data.ingest_dart
      - name: Evaluate financials + factors
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python -m app.db.eval_financials --verbose
