name: Weekly Fundamentals + Evaluation
# Pulls KR corporate fundamentals from DART OpenAPI, then runs the rule-
# based financials/factors evaluator. Stores into Supabase tables
# `fundamentals`, `financials_eval`, `factors_eval`. Site reads these
# via the stocks/[ticker] page's context tabs.
#
# Schedule: Saturdays 02:00 UTC (= 11:00 KST). Fundamentals update on a
# quarterly cadence, so weekly is more than enough — we just want a
# steady refresh signal.

on:
  schedule:
    - cron: "0 2 * * 6"   # Saturday 02:00 UTC = 11:00 KST
  workflow_dispatch:
    inputs:
      limit:
        description: "limit fundamentals fetch to N stock codes (debug)"
        required: false

jobs:
  fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # DART throttles; full KR universe takes time
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - run: |
          pip install -r requirements.txt
      - name: DART fundamentals ingest (Supabase direct)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          python -m app.data.ingest_dart
      - name: DART disclosures ingest (KR corporate filings)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          # Moved here from daily-scan (2026-05-19) — DART per-company
          # API call across the KR universe takes ~37 min, blowing the
          # daily 60-min budget. Disclosures update weekly cadence at
          # most for our display surface, so weekly is sufficient and
          # keeps daily-scan focused on price/flow refresh.
          # 90-day backfill so the Saturday catch-up picks up the
          # whole prior week + buffer for any past misses.
          python -m app.db.ingest_news --days-back 90
      - name: SEC EDGAR fundamentals + filings (US tickers)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          # Mirrors DART for the US side: companyfacts → `fundamentals`,
          # submissions → `disclosures`. SEC fair-use throttles at 10 r/s;
          # the module sleeps 0.15s/req so it stays comfortable. Rate-
          # limit headroom keeps this <15 min for the current US set.
          python -m app.data.ingest_sec
      - name: Company profile ingest (DART + SEC EDGAR)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          # Refresh company overview + recent filings for every active
          # KR ticker + every watchlisted US ticker. Light load
          # (~3K API calls), runs in <10 min.
          python -m app.data.ingest_company_profile
      - name: Evaluate financials + factors
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python -m app.db.eval_financials --verbose
      - name: Retention sweep (post-ingest)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # SEC ingest already filters to the engagement set, but DART
          # writes the full KR universe and `analyze_results` /
          # `disclosures` may still have rows for previously-engaged-but-
          # now-stale tickers. Sweep keeps the 500MB tier honest.
          python -m app.db.retention
